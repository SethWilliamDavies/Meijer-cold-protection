const KEY='meijerColdProtectionSelectedStores',CORRECTION_F=2;
let weatherByStore={},testMode=false,testTemp=32,currentView='my',returnView='my',allMarket='ALL',settingsMarket='ALL';
let selected=loadSelected(),draft=new Set(selected);
function loadSelected(){try{const x=JSON.parse(localStorage.getItem(KEY)||'[]');return new Set(Array.isArray(x)?x:[])}catch{return new Set()}}
function week(){return Number(document.getElementById('week').value||13)}
function low(s){return testMode?testTemp:weatherByStore[s.store]}
function inWeek(r,w){return !((r.fw!==null&&w<r.fw)||(r.lw!==null&&w>r.lw))}
function action(r,t){if(t<27)return[r.b27a,r.b27d];if(t<=35)return[r.a2835,r.d2835];if(t<=39)return[r.a3639,r.d3639];if(t<=44)return[r.a4044,r.d4044];return[r.a4550,r.d4550]}
function actions(t,w){let move=[],cover=[],mi='',ci='';if(t==null||Number.isNaN(t))return{move,cover,mi,ci};RULES.forEach(r=>{if(!inWeek(r,w))return;const[a,d]=action(r,t);if(a==='Move Inside'){move.push(r.name);if(!mi)mi=d||''}if(a==='Cover'){cover.push(r.name);if(!ci)ci=d||''}});return{move,cover,mi:mi||'Rack product and bring inside if possible',ci:ci||'Cover exposed tables with frost cloth'}}
function level(a){return a.move.length?'move':a.cover.length?'cover':'none'}
function label(a){return a.move.length?'Move Inside':a.cover.length?'Cover':'No Action'}
function tempText(t){return t==null||Number.isNaN(t)?'—':Math.round(t)+'°'}
function sorted(x){return [...x].sort((a,b)=>Number(a.store)-Number(b.store))}
function summary(list){let m=0,c=0;list.forEach(s=>{const a=actions(low(s),week());if(a.move.length)m++;else if(a.cover.length)c++});return `<div class="sum"><span>Stores</span><b>${list.length}</b></div><div class="sum"><span>Move Inside</span><b>${m}</b></div><div class="sum"><span>Cover</span><b>${c}</b></div>`}
function card(s){const t=low(s),a=actions(t,week()),l=level(a);return `<button class="store ${l}" data-store="${s.store}"><div class="cardtop"><div><div class="num">Store ${s.store}</div><div class="meta">${s.city}, ${s.state} · ${s.region}</div></div><div><div class="templabel">Tonight Low</div><div class="temp">${tempText(t)}</div></div></div><div class="actionrow"><span class="pill ${l}">${label(a)}</span><span class="counts">${a.move.length} move · ${a.cover.length} cover</span></div></button>`}
function bindCards(el){el.querySelectorAll('[data-store]').forEach(b=>b.onclick=()=>showDetail(STORES.find(s=>s.store===b.dataset.store)))}
function renderMy(){const list=sorted(STORES.filter(s=>selected.has(s.store)));document.getElementById('mycount').textContent=list.length?`${list.length} selected`:'No stores selected yet';document.getElementById('mysummary').innerHTML=summary(list);const el=document.getElementById('mylist');if(list.length){el.innerHTML=list.map(card).join('');bindCards(el);return}el.innerHTML='<div class="empty"><b>No stores selected yet.</b><p style="margin:8px 0 16px;line-height:1.45">Choose the stores you manage so they appear here each time you open the dashboard.</p><button id="selectMyStoresBtn" class="btn primary" style="width:100%">Select My Stores</button></div>';document.getElementById('selectMyStoresBtn').onclick=()=>show('settings')}
function markets(id,active,cb){const vals=['ALL',...new Set(STORES.map(s=>s.region).sort())],el=document.getElementById(id);el.innerHTML=vals.map(v=>`<button class="filter ${v===active?'active':''}" data-market="${v}">${v==='ALL'?'All':v}</button>`).join('');el.querySelectorAll('[data-market]').forEach(b=>b.onclick=()=>cb(b.dataset.market))}
function match(s,q){q=q.trim().toLowerCase();return !q||[s.store,s.city,s.state,s.zip,s.region,s.address].join(' ').toLowerCase().includes(q)}
function renderAll(){markets('allfilters',allMarket,v=>{allMarket=v;renderAll()});const q=document.getElementById('search').value,list=sorted(STORES.filter(s=>(allMarket==='ALL'||s.region===allMarket)&&match(s,q)));document.getElementById('allsummary').innerHTML=summary(list);const el=document.getElementById('alllist');el.innerHTML=list.length?list.map(card).join(''):'<div class="empty">No matching stores found.</div>';bindCards(el)}
function updateCount(){document.getElementById('savecount').textContent=`${draft.size} store${draft.size===1?'':'s'} selected`}
function renderSettings(){markets('settingsfilters',settingsMarket,v=>{settingsMarket=v;renderSettings()});const q=document.getElementById('settingssearch').value,list=sorted(STORES.filter(s=>(settingsMarket==='ALL'||s.region===settingsMarket)&&match(s,q))),el=document.getElementById('settingslist');el.innerHTML=list.map(s=>`<label class="select"><input type="checkbox" data-select="${s.store}" ${draft.has(s.store)?'checked':''}><div><b>Store ${s.store}</b><div class="meta">${s.city}, ${s.state} · ${s.region}</div></div></label>`).join('');el.querySelectorAll('[data-select]').forEach(x=>x.onchange=()=>{x.checked?draft.add(x.dataset.select):draft.delete(x.dataset.select);updateCount()});updateCount()}
function renderDetail(s){const t=low(s),a=actions(t,week()),l=level(a),el=document.getElementById('detailview');el.innerHTML=`<div class="sectionhead"><button id="back" class="btn">← Back</button><div style="text-align:right"><h2>Store ${s.store}</h2><div class="note">${s.city}, ${s.state}</div></div></div><div class="detailcard"><div class="cardtop"><div><div class="templabel">Market</div><div class="num">${s.region}</div></div><div><div class="templabel">Tonight Low</div><div class="temp">${tempText(t)}</div></div></div><div class="alert ${l}">${label(a)} · ${a.move.length} move inside · ${a.cover.length} cover</div></div>${a.move.length?`<div class="detailsection"><h3>Move Inside</h3><div class="instruction">${a.mi}</div><ul class="products">${a.move.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:''}${a.cover.length?`<div class="detailsection"><h3>Cover</h3><div class="instruction">${a.ci}</div><ul class="products">${a.cover.map(x=>`<li>${x}</li>`).join('')}</ul></div>`:''}${!a.move.length&&!a.cover.length?'<div class="detailsection"><h3>No protection needed tonight</h3></div>':''}`;document.getElementById('back').onclick=()=>show(returnView)}
function showDetail(s){returnView=currentView;currentView='detail';['myview','allview','settingsview'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById('detailview').classList.remove('hidden');document.getElementById('savebar').classList.add('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));renderDetail(s);scrollTo(0,0)}
function show(v){currentView=v;document.getElementById('myview').classList.toggle('hidden',v!=='my');document.getElementById('allview').classList.toggle('hidden',v!=='all');document.getElementById('settingsview').classList.toggle('hidden',v!=='settings');document.getElementById('detailview').classList.add('hidden');document.getElementById('savebar').classList.toggle('hidden',v!=='settings');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));if(v==='my')renderMy();if(v==='all')renderAll();if(v==='settings'){draft=new Set(selected);renderSettings()}scrollTo(0,0)}
function rerender(){if(currentView==='my')renderMy();else if(currentView==='all')renderAll();else if(currentView==='settings')renderSettings()}
function updateTest(){testMode=document.getElementById('testmode').checked;testTemp=Number(document.getElementById('testtemp').value);if(Number.isNaN(testTemp))testTemp=32;const b=document.getElementById('banner');b.classList.toggle('hidden',!testMode);b.textContent=`TEST MODE ON — every store is using a fake low of ${Math.round(testTemp)}°.`;if(testMode)document.getElementById('status').textContent=`Test Mode is ON. Fake low: ${Math.round(testTemp)}°.`;rerender()}
function fetchWeather(s){return fetch(`/.netlify/functions/weather?lat=${s.lat}&lon=${s.lon}`).then(r=>r.json()).then(d=>{const times=d.hourly?.time||[],temps=d.hourly?.temperature_2m||[];if(!times.length||!temps.length)return null;const now=new Date(),end=new Date(now);end.setHours(8,0,0,0);if(now.getHours()>=8)end.setDate(end.getDate()+1);let min=null;for(let i=0;i<times.length;i++){const t=new Date(times[i]);if(t>=now&&t<=end){const v=temps[i];if(v!=null&&(min===null||v<min))min=v}}return min==null?null:min-CORRECTION_F}).catch(()=>null)}
async function loadWeather(){weatherByStore={};const st=document.getElementById('status'),fill=document.getElementById('fill');st.textContent='Loading weather…';fill.style.width='0%';let i=0,done=0;async function worker(){while(i<STORES.length){const s=STORES[i++];weatherByStore[s.store]=await fetchWeather(s);done++;fill.style.width=Math.round(done/STORES.length*100)+'%';st.textContent=`Loading weather… ${done} of ${STORES.length}`;rerender()}}await Promise.all(Array.from({length:10},worker));st.textContent=`Weather loaded for ${done} stores. Includes -2° correction.`;rerender()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>show(b.dataset.view));
document.getElementById('search').oninput=renderAll;document.getElementById('settingssearch').oninput=renderSettings;document.getElementById('week').oninput=rerender;document.getElementById('testmode').onchange=updateTest;document.getElementById('testtemp').oninput=updateTest;document.getElementById('refresh').onclick=loadWeather;
document.getElementById('save').onclick=()=>{selected=new Set(draft);localStorage.setItem(KEY,JSON.stringify([...selected].sort()));show('my')};document.getElementById('cancel').onclick=()=>{draft=new Set(selected);show('my')};
show('my');loadWeather();
</script></body></html>
